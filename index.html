<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0806">
<title>Terras Raras</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C8A038;--gold-light:#E8C060;--gold-dark:#6A5010;
  --void:#0A0806;--deep:#120F0A;--surface:#1C1710;--panel:#241E14;--panel2:#2E261A;
  --border:#3A2E1A;--border2:#4A3E2A;
  --text:#E8DCC8;--muted:#8A7A5A;--hint:#4A3A1A;
  --danger:#C84030;--success:#3A8A50;--info:#3878C8;
  --font-d:'Cinzel',serif;--font-b:'Crimson Pro',serif;
  --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
}
html,body{height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:var(--font-b)}

/* SCREENS */
.screen{display:none;height:100vh;height:100dvh;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* PARTICLES */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.pt{position:absolute;width:1px;height:1px;background:var(--gold);border-radius:50%;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{opacity:0;transform:translateY(0)}15%{opacity:0.5}85%{opacity:0.2}100%{opacity:0;transform:translateY(-100vh)}}

/* === LOGIN === */
#login-screen{align-items:center;justify-content:center;position:relative;background:radial-gradient(ellipse at 50% 20%,#1E1508 0%,var(--void) 65%)}
.login-wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:2rem 1.5rem;text-align:center}
.logo{font-family:var(--font-d);font-size:clamp(2.5rem,10vw,4rem);font-weight:900;letter-spacing:0.12em;line-height:0.95;margin-bottom:0.5rem}
.logo-a{color:transparent;-webkit-text-stroke:2px var(--gold)}
.logo-b{color:var(--gold)}
.logo-sub{font-family:var(--font-b);font-style:italic;color:var(--muted);font-size:0.85rem;letter-spacing:0.35em;text-transform:uppercase;margin-bottom:2rem}
.divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.25rem auto}
.tabs{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:1.5rem}
.tab{flex:1;padding:0.55rem;background:transparent;border:none;color:var(--muted);font-family:var(--font-d);font-size:0.65rem;letter-spacing:0.12em;cursor:pointer;transition:all 0.2s}
.tab.on{background:var(--panel);color:var(--gold)}
.field{margin-bottom:0.9rem;text-align:left}
.field label{display:block;font-size:0.65rem;letter-spacing:0.15em;color:var(--muted);margin-bottom:0.3rem;font-family:var(--font-d);text-transform:uppercase}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:0.65rem 0.9rem;color:var(--text);font-family:var(--font-b);font-size:1rem;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--gold)}
.btn-primary{width:100%;padding:0.8rem;background:var(--gold-dark);border:1px solid var(--gold);border-radius:5px;color:var(--gold-light);font-family:var(--font-d);font-size:0.7rem;letter-spacing:0.2em;cursor:pointer;transition:all 0.2s;margin-top:0.25rem}
.btn-primary:hover{background:var(--gold);color:var(--void)}
.btn-primary:active{transform:scale(0.98)}
.auth-msg{font-size:0.85rem;padding:0.5rem 0.75rem;border-radius:4px;margin-top:0.75rem;text-align:center;display:none}
.auth-msg.err{background:rgba(200,64,48,0.15);color:var(--danger);border:1px solid rgba(200,64,48,0.3);display:block}
.auth-msg.ok{background:rgba(58,138,80,0.12);color:#5ACA70;border:1px solid rgba(58,138,80,0.3);display:block}

/* === HUB === */
#hub-screen{background:var(--deep)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(0.75rem + var(--safe-top)) 1.25rem 0.75rem;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.topbar-title{font-family:var(--font-d);font-size:0.85rem;letter-spacing:0.2em;color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:0.6rem}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-dark);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:0.6rem;color:var(--gold-light)}
.btn-ghost{background:transparent;border:1px solid var(--border);border-radius:4px;padding:0.35rem 0.65rem;color:var(--muted);font-family:var(--font-d);font-size:0.55rem;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s}
.btn-ghost:hover{border-color:var(--danger);color:var(--danger)}
.hub-body{flex:1;overflow-y:auto;padding:1.25rem;padding-bottom:calc(1.25rem + var(--safe-bot))}
.hub-body::-webkit-scrollbar{width:3px}
.hub-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.greet{font-family:var(--font-d);font-size:1.25rem;color:var(--gold);margin-bottom:0.2rem}
.greet-sub{color:var(--muted);font-style:italic;font-size:0.9rem;margin-bottom:1.75rem}
.sec-title{font-family:var(--font-d);font-size:0.6rem;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;margin-bottom:0.75rem;margin-top:1.5rem}
.sec-title:first-of-type{margin-top:0}
.campaigns{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:0.5rem}
.campaign-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1rem 1rem 1.25rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;display:flex;align-items:center;gap:0.75rem}
.campaign-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold)}
.campaign-card:hover{border-color:var(--border2);transform:translateX(2px)}
.campaign-card:active{transform:scale(0.99)}
.campaign-info{flex:1;min-width:0}
.campaign-name{font-family:var(--font-d);font-size:0.85rem;color:var(--gold-light);margin-bottom:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.campaign-meta{font-size:0.75rem;color:var(--muted);font-style:italic}
.campaign-code{font-family:var(--font-d);font-size:0.6rem;letter-spacing:0.1em;color:var(--hint);flex-shrink:0}
.empty-state{color:var(--muted);font-style:italic;font-size:0.9rem;padding:0.75rem 0;text-align:center}
.input-group{display:flex;gap:0.5rem;margin-bottom:0.5rem}
.input-group input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:0.65rem 0.9rem;color:var(--text);font-family:var(--font-b);font-size:0.95rem;outline:none;min-width:0}
.input-group input:focus{border-color:var(--gold)}
.btn-sm{padding:0.65rem 1rem;background:var(--panel);border:1px solid var(--border2);border-radius:5px;color:var(--gold);font-family:var(--font-d);font-size:0.6rem;letter-spacing:0.12em;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.btn-sm:hover{border-color:var(--gold)}
.btn-sm:active{transform:scale(0.97)}
.hub-msg{font-size:0.85rem;padding:0.5rem 0.75rem;border-radius:4px;margin-top:0.5rem;display:none}
.hub-msg.err{background:rgba(200,64,48,0.12);color:var(--danger);border:1px solid rgba(200,64,48,0.25);display:block}
.hub-msg.ok{background:rgba(58,138,80,0.12);color:#5ACA70;border:1px solid rgba(58,138,80,0.25);display:block}

/* === GAME === */
#game-screen{background:var(--void)}
.game-header{display:flex;align-items:center;gap:0.75rem;padding:calc(0.6rem + var(--safe-top)) 1rem 0.6rem;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.btn-back{background:transparent;border:1px solid var(--border);border-radius:4px;padding:0.35rem 0.65rem;color:var(--muted);font-family:var(--font-d);font-size:0.55rem;letter-spacing:0.1em;cursor:pointer;flex-shrink:0}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}
.gh-title{font-family:var(--font-d);font-size:0.75rem;letter-spacing:0.15em;color:var(--gold);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gh-code{font-family:var(--font-d);font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;flex-shrink:0;cursor:pointer}
.gh-code:hover{color:var(--gold)}
.statbar{display:flex;align-items:center;gap:1rem;padding:0.5rem 1rem;background:var(--deep);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.statbar::-webkit-scrollbar{display:none}
.stat{display:flex;align-items:center;gap:0.35rem;flex-shrink:0}
.stat-l{font-family:var(--font-d);font-size:0.55rem;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase}
.stat-v{font-family:var(--font-d);font-size:0.8rem;color:var(--gold-light)}
.hp-track{width:48px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.hp-fill{height:100%;background:var(--success);border-radius:2px;transition:width 0.5s}
.game-body{flex:1;display:flex;overflow:hidden}
.log-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.log{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.75rem}
.log::-webkit-scrollbar{width:3px}
.log::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.entry{padding:0.85rem 1rem;border-radius:6px;animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.e-narrator{background:var(--panel);border-left:2px solid var(--gold);font-style:italic;font-size:0.95rem;line-height:1.7}
.e-player{background:var(--surface);border-left:2px solid var(--info);font-size:0.85rem;color:var(--muted)}
.e-system{text-align:center;font-size:0.7rem;color:var(--hint);font-family:var(--font-d);letter-spacing:0.1em;padding:0.25rem}
.e-name{font-family:var(--font-d);font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.35rem}
.e-narrator .e-name{color:var(--gold)}
.e-player .e-name{color:var(--info)}
.typing{display:none;align-items:center;gap:5px;padding:0.75rem 1rem;color:var(--muted);font-style:italic;font-size:0.85rem}
.typing.show{display:flex}
.dot{width:4px;height:4px;border-radius:50%;background:var(--gold);animation:blink 1.2s ease infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,100%{opacity:0.2;transform:scale(0.7)}50%{opacity:1;transform:scale(1)}}
.actions{padding:0.75rem 1rem;border-top:1px solid var(--border);background:var(--deep);padding-bottom:calc(0.75rem + var(--safe-bot));flex-shrink:0}
.choices{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.6rem}
.choice{padding:0.35rem 0.75rem;background:var(--panel);border:1px solid var(--border2);border-radius:20px;color:var(--text);font-family:var(--font-b);font-size:0.8rem;cursor:pointer;transition:all 0.2s;font-style:italic}
.choice:hover{border-color:var(--gold);color:var(--gold-light)}
.choice:active{transform:scale(0.96)}
.send-row{display:flex;gap:0.5rem}
.send-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:0.6rem 0.85rem;color:var(--text);font-family:var(--font-b);font-size:0.95rem;outline:none;min-width:0}
.send-input:focus{border-color:var(--gold)}
.send-btn{padding:0.6rem 1rem;background:var(--gold-dark);border:1px solid var(--gold);border-radius:5px;color:var(--gold-light);font-family:var(--font-d);font-size:0.6rem;letter-spacing:0.15em;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.send-btn:hover:not(:disabled){background:var(--gold);color:var(--void)}
.send-btn:disabled{opacity:0.35;cursor:not-allowed}
.send-btn:active:not(:disabled){transform:scale(0.97)}

/* SIDE PANEL */
.side{width:220px;border-left:1px solid var(--border);background:var(--deep);display:flex;flex-direction:column;overflow-y:auto}
.side::-webkit-scrollbar{width:3px}
.side::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.side-sec{padding:0.85rem;border-bottom:1px solid var(--border)}
.side-sec-title{font-family:var(--font-d);font-size:0.55rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:0.6rem}
.zone-name{font-family:var(--font-d);font-size:0.8rem;color:var(--gold);margin-bottom:0.2rem}
.zone-desc{font-size:0.75rem;color:var(--muted);font-style:italic;line-height:1.4}
.inv-item{font-size:0.8rem;padding:0.25rem 0;border-bottom:1px solid var(--border);color:var(--text);display:flex;align-items:center;gap:0.4rem}
.inv-item:last-child{border:none}
.inv-item::before{content:'◆';color:var(--gold-dark);font-size:0.6rem;flex-shrink:0}
.player-row{display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0}
.p-av{width:22px;height:22px;border-radius:50%;background:var(--panel2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:0.5rem;color:var(--gold);flex-shrink:0}
.p-name{flex:1;font-size:0.78rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-hp{font-family:var(--font-d);font-size:0.65rem;color:var(--success);flex-shrink:0}

/* LOADING */
#loading{position:fixed;inset:0;background:rgba(10,8,6,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1rem}
#loading.hide{display:none}
.spinner{width:36px;height:36px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:var(--font-d);font-size:0.75rem;letter-spacing:0.2em;color:var(--gold);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}

/* TOAST */
#toast{position:fixed;bottom:calc(1.5rem + var(--safe-bot));left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border2);border-radius:6px;padding:0.6rem 1.25rem;font-family:var(--font-d);font-size:0.65rem;letter-spacing:0.1em;color:var(--gold);z-index:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

/* MOBILE */
@media(max-width:600px){.side{display:none}}
</style>
</head>
<body>

<!-- PARTICLES -->
<div id="particles"></div>

<!-- LOADING -->
<div id="loading" class="hide">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">Carregando...</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- LOGIN -->
<div class="screen active" id="login-screen">
  <div class="login-wrap">
    <div class="logo"><span class="logo-a">TER</span><span class="logo-b">RAS</span><br><span class="logo-b">RA</span><span class="logo-a">RAS</span></div>
    <div class="logo-sub">Arena dos Sobreviventes</div>
    <div class="divider"></div>
    <div class="tabs">
      <button class="tab on" id="tab-login-btn" onclick="switchTab('login')">Entrar</button>
      <button class="tab" id="tab-reg-btn" onclick="switchTab('reg')">Criar conta</button>
    </div>
    <div id="pane-login">
      <div class="field"><label>Nome de jogadora</label><input id="l-user" placeholder="ex: Julia" autocomplete="username" /></div>
      <div class="field"><label>Senha</label><input id="l-pass" type="password" placeholder="••••••" autocomplete="current-password" /></div>
      <button class="btn-primary" onclick="doLogin()">⚔ Entrar na Arena</button>
    </div>
    <div id="pane-reg" style="display:none">
      <div class="field"><label>Nome de jogadora</label><input id="r-user" placeholder="ex: Katrina" autocomplete="username" /></div>
      <div class="field"><label>Senha</label><input id="r-pass" type="password" placeholder="••••••" autocomplete="new-password" /></div>
      <div class="field"><label>Confirmar senha</label><input id="r-pass2" type="password" placeholder="••••••" /></div>
      <button class="btn-primary" onclick="doRegister()">✦ Criar personagem</button>
    </div>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- HUB -->
<div class="screen" id="hub-screen">
  <div class="topbar">
    <div class="topbar-title">✦ TERRAS RARAS</div>
    <div class="topbar-right">
      <div class="avatar" id="hub-av">JU</div>
      <span style="font-family:var(--font-d);font-size:0.7rem;color:var(--text)" id="hub-name">Julia</span>
      <button class="btn-ghost" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="hub-body">
    <div class="greet" id="hub-greet">Bem-vinda, Julia</div>
    <div class="greet-sub">Escolha uma campanha ou crie uma nova sala</div>
    <div class="sec-title">Minhas campanhas</div>
    <div class="campaigns" id="campaigns-list"></div>
    <div class="sec-title">Criar nova sala</div>
    <div class="input-group">
      <input id="new-room-name" placeholder="Nome da sala" />
      <button class="btn-sm" onclick="createRoom()">Criar</button>
    </div>
    <div class="sec-title">Entrar com código</div>
    <div class="input-group">
      <input id="join-code" placeholder="SALA-XXXX" style="text-transform:uppercase" />
      <button class="btn-sm" onclick="joinRoom()">Entrar</button>
    </div>
    <div class="hub-msg" id="hub-msg"></div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game-screen">
  <div class="game-header">
    <button class="btn-back" onclick="goHub()">← Hub</button>
    <div class="gh-title" id="gh-title">Sala</div>
    <div class="gh-code" id="gh-code" onclick="copyCode()" title="Copiar código"></div>
  </div>
  <div class="statbar">
    <div class="stat">
      <span class="stat-l">Vida</span>
      <div class="hp-track"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
      <span class="stat-v" id="s-hp">100</span>
    </div>
    <div class="stat"><span class="stat-l">Energia</span><span class="stat-v" id="s-en">80</span></div>
    <div class="stat"><span class="stat-l">Força</span><span class="stat-v" id="s-str">12</span></div>
    <div class="stat"><span class="stat-l">Zona</span><span class="stat-v" id="s-zone">—</span></div>
  </div>
  <div class="game-body">
    <div class="log-col">
      <div class="log" id="log"></div>
      <div class="typing" id="typing">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <span>A narradora está escrevendo...</span>
      </div>
      <div class="actions">
        <div class="choices" id="choices"></div>
        <div class="send-row">
          <input class="send-input" id="action-input" placeholder="O que você faz?" />
          <button class="send-btn" id="send-btn" onclick="sendAction()">AGIR</button>
        </div>
      </div>
    </div>
    <div class="side">
      <div class="side-sec">
        <div class="side-sec-title">Zona atual</div>
        <div class="zone-name" id="side-zone">—</div>
        <div class="zone-desc" id="side-zone-desc"></div>
      </div>
      <div class="side-sec">
        <div class="side-sec-title">Inventário</div>
        <div id="inv-list"></div>
      </div>
      <div class="side-sec" style="flex:1">
        <div class="side-sec-title">Jogadoras</div>
        <div id="players-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// CONFIG — troque pela URL do seu backend no Railway
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8000'
  : 'https://heartfelt-consideration-production-b59e.up.railway.app'; // <-- TROCAR AQUI

const ZONE_INFO = {
  'Floresta Negra':     {icon:'🌑', desc:'Árvores que se movem. O silêncio te observa.'},
  'Fábrica Carmesim':  {icon:'🍬', desc:'Doces alucinógenos. As cores mentem.'},
  'Picos Arcaicos':    {icon:'⛰', desc:'Montanhas com criaturas pré-históricas.'},
  'Gelo Eterno':       {icon:'❄', desc:'Frio que paralisa o pensamento.'},
  'Alexandria':        {icon:'🏛', desc:'A cidade perdida. Cleópatra observa.'},
  'Tempestade dos Deuses':{icon:'⚡', desc:'Dois deuses em guerra controlam o céu.'},
  'Enclave Sombrio':   {icon:'🔱', desc:'Demônios e um portão que se fecha.'},
  'O Vazio':           {icon:'◌', desc:'Nada. E por isso é o mais perigoso.'},
};
const DEFAULT_CHOICES = [
  'Explorar os arredores com cautela',
  'Escalar o ponto mais alto para ver o horizonte',
  'Procurar água e comida',
  'Observar em silêncio antes de agir'
];

let token = localStorage.getItem('tr_token') || '';
let username = localStorage.getItem('tr_user') || '';
let currentRoomId = '';
let currentRoomCode = '';
let isWaiting = false;
let ws = null;

// UTILS
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function loading(txt='Carregando...'){document.getElementById('loading-txt').textContent=txt;document.getElementById('loading').classList.remove('hide')}
function hideLoading(){document.getElementById('loading').classList.add('hide')}
function showMsg(id,txt,type){const el=document.getElementById(id);el.className='auth-msg '+type||'hub-msg '+type;el.textContent=txt;el.style.display='block';setTimeout(()=>{el.style.display='none'},3500)}
function toast(txt){const t=document.getElementById('toast');t.textContent=txt;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

async function api(method, path, body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(token)opts.headers['Authorization']='Bearer '+token;
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(API+path,opts);
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(data.detail||'Erro na requisição');
  return data;
}

// AUTH
function switchTab(t){
  document.getElementById('tab-login-btn').classList.toggle('on',t==='login');
  document.getElementById('tab-reg-btn').classList.toggle('on',t==='reg');
  document.getElementById('pane-login').style.display=t==='login'?'block':'none';
  document.getElementById('pane-reg').style.display=t==='reg'?'block':'none';
}
async function doLogin(){
  const user=document.getElementById('l-user').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!user||!pass)return showMsg('auth-msg','Preencha todos os campos','err');
  loading('Entrando na arena...');
  try{
    const d=await api('POST','/auth/login',{username:user,password:pass});
    token=d.token;username=d.username;
    localStorage.setItem('tr_token',token);localStorage.setItem('tr_user',username);
    hideLoading();enterHub();
  }catch(e){hideLoading();showMsg('auth-msg',e.message,'err')}
}
async function doRegister(){
  const user=document.getElementById('r-user').value.trim();
  const pass=document.getElementById('r-pass').value;
  const pass2=document.getElementById('r-pass2').value;
  if(!user||!pass)return showMsg('auth-msg','Preencha todos os campos','err');
  if(pass!==pass2)return showMsg('auth-msg','As senhas não conferem','err');
  if(pass.length<4)return showMsg('auth-msg','Senha mínimo 4 caracteres','err');
  loading('Criando personagem...');
  try{
    const d=await api('POST','/auth/register',{username:user,password:pass});
    token=d.token;username=d.username;
    localStorage.setItem('tr_token',token);localStorage.setItem('tr_user',username);
    hideLoading();enterHub();
  }catch(e){hideLoading();showMsg('auth-msg',e.message,'err')}
}
function doLogout(){
  token='';username='';currentRoomId='';
  localStorage.removeItem('tr_token');localStorage.removeItem('tr_user');
  if(ws){ws.close();ws=null}
  show('login-screen');
}

// HUB
async function enterHub(){
  document.getElementById('hub-av').textContent=(username||'?').slice(0,2).toUpperCase();
  document.getElementById('hub-name').textContent=username;
  document.getElementById('hub-greet').textContent=`Bem-vinda, ${username}`;
  loading('Carregando campanhas...');
  try{
    const rooms=await api('GET','/rooms/mine');
    renderCampaigns(rooms);
  }catch(e){console.error(e)}
  hideLoading();
  show('hub-screen');
}
function renderCampaigns(rooms){
  const c=document.getElementById('campaigns-list');
  if(!rooms.length){c.innerHTML=`<div class="empty-state">Nenhuma campanha — crie uma sala para começar</div>`;return}
  c.innerHTML=rooms.map(r=>`
    <div class="campaign-card" onclick="enterRoom('${r.id}')">
      <div class="campaign-info">
        <div class="campaign-name">${r.name}</div>
        <div class="campaign-meta">${r.last_entry?r.last_entry.slice(0,60)+'...':'Aventura não iniciada'}</div>
      </div>
      <div class="campaign-code">${r.code}</div>
    </div>`).join('');
}
async function createRoom(){
  const name=document.getElementById('new-room-name').value.trim()||`Sala de ${username}`;
  loading('Criando sala...');
  try{
    const r=await api('POST','/rooms/create',{name});
    document.getElementById('new-room-name').value='';
    hideLoading();
    toast(`Sala criada! Código: ${r.code}`);
    enterRoom(r.id);
  }catch(e){hideLoading();showMsg('hub-msg',e.message,'err')}
}
async function joinRoom(){
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!code)return showMsg('hub-msg','Digite o código da sala','err');
  loading('Entrando na sala...');
  try{
    const r=await api('POST','/rooms/join',{code});
    document.getElementById('join-code').value='';
    hideLoading();enterRoom(r.id);
  }catch(e){hideLoading();showMsg('hub-msg',e.message,'err')}
}

// GAME
async function enterRoom(roomId){
  loading('Carregando aventura...');
  try{
    const room=await api('GET',`/rooms/${roomId}`);
    currentRoomId=roomId;
    currentRoomCode=room.code;
    document.getElementById('gh-title').textContent=room.name;
    document.getElementById('gh-code').textContent=room.code;
    const me=room.my_stats||{hp:100,energy:80,strength:12,inventory:['Adaga enferrujada','Cantil vazio']};
    updateStats(me);
    updateZone(room.zone);
    updateInventory(me.inventory||[]);
    updatePlayers(room.players);
    renderLog(room.log||[]);
    renderChoices(DEFAULT_CHOICES);
    connectWS(roomId);
    hideLoading();
    show('game-screen');
    if(!room.log||room.log.length===0){
      setTimeout(()=>startNarration(room),400);
    }
  }catch(e){hideLoading();toast('Erro ao carregar sala: '+e.message)}
}
function updateStats(me){
  document.getElementById('s-hp').textContent=me.hp;
  document.getElementById('s-en').textContent=me.energy;
  document.getElementById('s-str').textContent=me.strength||12;
  document.getElementById('hp-fill').style.width=me.hp+'%';
  const z=document.getElementById('s-zone');
  // zone updated separately
}
function updateZone(zone){
  const info=ZONE_INFO[zone]||{icon:'?',desc:''};
  document.getElementById('s-zone').textContent=zone.split(' ')[0];
  document.getElementById('side-zone').textContent=info.icon+' '+zone;
  document.getElementById('side-zone-desc').textContent=info.desc;
}
function updateInventory(inv){
  document.getElementById('inv-list').innerHTML=inv&&inv.length
    ?inv.map(i=>`<div class="inv-item">${i}</div>`).join('')
    :`<div style="color:var(--hint);font-size:0.75rem;font-style:italic">Nenhum item</div>`;
}
function updatePlayers(players){
  document.getElementById('players-list').innerHTML=players.map(p=>`
    <div class="player-row">
      <div class="p-av">${(p.username||'?').slice(0,2).toUpperCase()}</div>
      <span class="p-name">${p.username}</span>
      <span class="p-hp">${p.hp}hp</span>
    </div>`).join('');
}
function renderLog(log){
  const c=document.getElementById('log');
  c.innerHTML=log.map(e=>{
    if(e.type==='narrator')return`<div class="entry e-narrator"><div class="e-name">✦ Narradora</div>${e.text}</div>`;
    if(e.type==='player')return`<div class="entry e-player"><div class="e-name">${e.player}</div>${e.text}</div>`;
    return`<div class="entry e-system">${e.text}</div>`;
  }).join('');
  c.scrollTop=c.scrollHeight;
}
function addEntry(entry){
  const c=document.getElementById('log');
  const el=document.createElement('div');
  if(entry.type==='narrator')el.innerHTML=`<div class="entry e-narrator"><div class="e-name">✦ Narradora</div>${entry.text}</div>`;
  else if(entry.type==='player')el.innerHTML=`<div class="entry e-player"><div class="e-name">${entry.player}</div>${entry.text}</div>`;
  else el.innerHTML=`<div class="entry e-system">${entry.text}</div>`;
  c.appendChild(el.firstChild);
  c.scrollTop=c.scrollHeight;
}
function renderChoices(choices){
  document.getElementById('choices').innerHTML=choices.map(c=>`<button class="choice" onclick="quickAction('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('');
}

async function startNarration(room){
  addEntry({type:'system',text:`— Aventura iniciada: ${room.zone} —`});
  await callNarrator(`__start__`);
}

async function sendAction(){
  if(isWaiting)return;
  const inp=document.getElementById('action-input');
  const action=inp.value.trim();
  if(!action)return;
  inp.value='';
  addEntry({type:'player',player:username,text:action});
  await callNarrator(action);
}

async function callNarrator(action){
  isWaiting=true;
  document.getElementById('send-btn').disabled=true;
  document.getElementById('typing').classList.add('show');
  document.getElementById('choices').innerHTML='';
  try{
    const data=await api('POST','/narrate',{room_id:currentRoomId,action});
    document.getElementById('typing').classList.remove('show');
    addEntry({type:'narrator',text:data.narration});
    applyEffects(data.narration);
    renderChoices(extractChoices(data.narration));
    // refresh players
    const room=await api('GET',`/rooms/${currentRoomId}`);
    updatePlayers(room.players);
    updateInventory(room.my_stats?.inventory||[]);
    updateStats(room.my_stats||{hp:100,energy:80,strength:12});
  }catch(e){
    document.getElementById('typing').classList.remove('show');
    addEntry({type:'system',text:'⚠ A narradora dorme. Tente novamente.'});
    renderChoices(DEFAULT_CHOICES);
  }
  document.getElementById('send-btn').disabled=false;
  isWaiting=false;
}

function applyEffects(text){
  const t=text.toLowerCase();
  let hp=parseInt(document.getElementById('s-hp').textContent)||100;
  let en=parseInt(document.getElementById('s-en').textContent)||80;
  let changed=false;
  if(t.includes('ferida')||t.includes('machuca')||t.includes('golpe')||t.includes('dano')){hp=Math.max(10,hp-(Math.floor(Math.random()*12)+5));changed=true}
  if(t.includes('cura')||t.includes('recupera')||t.includes('descansa')){hp=Math.min(100,hp+8);changed=true}
  if(t.includes('exausta')||t.includes('cansada')){en=Math.max(10,en-10);changed=true}
  if(changed){
    document.getElementById('s-hp').textContent=hp;
    document.getElementById('s-en').textContent=en;
    document.getElementById('hp-fill').style.width=hp+'%';
    api('POST',`/rooms/${currentRoomId}/update-stats`,{hp,energy:en}).catch(()=>{});
  }
}

function extractChoices(text){
  const verbs=['explorar','correr','atacar','esconder','investigar','chamar','usar','pegar','subir','descer','fugir','lutar','observar'];
  const lines=text.split(/[.!?]\s+/);
  const found=[];
  lines.forEach(l=>{
    const lc=l.toLowerCase().trim();
    if(verbs.some(v=>lc.startsWith(v)||lc.includes(' '+v))){
      const clean=l.trim().replace(/^[^a-zA-ZÀ-ÿ0-9]*/,'');
      if(clean.length>8&&clean.length<80)found.push(clean.slice(0,72));
    }
  });
  return found.length>=2?found.slice(0,4):DEFAULT_CHOICES;
}

function quickAction(t){document.getElementById('action-input').value=t;sendAction()}

function copyCode(){
  navigator.clipboard.writeText(currentRoomCode).then(()=>toast('Código copiado: '+currentRoomCode)).catch(()=>toast(currentRoomCode));
}

async function goHub(){
  if(ws){ws.close();ws=null}
  currentRoomId='';
  await enterHub();
}

// WebSocket para multiplayer em tempo real
function connectWS(roomId){
  if(ws)ws.close();
  const wsUrl=(API.replace('https://','wss://').replace('http://','ws://'))+'/ws/'+roomId;
  try{
    ws=new WebSocket(wsUrl);
    ws.onmessage=(e)=>{
      const msg=JSON.parse(e.data);
      if(msg.type==='new_entries'&&msg.entries){
        msg.entries.filter(Boolean).forEach(entry=>{
          if(entry.type==='player'&&entry.player!==username){
            addEntry(entry);
          } else if(entry.type==='narrator'){
            // Se outra jogadora narrou, atualiza o log
            api('GET',`/rooms/${currentRoomId}`).then(r=>{
              updatePlayers(r.players);
              updateInventory(r.my_stats?.inventory||[]);
            }).catch(()=>{});
          }
        });
      }
    };
    ws.onerror=()=>{};
    ws.onclose=()=>{};
  }catch(e){}
}

// PARTICLES
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='pt';
    p.style.cssText=`left:${Math.random()*100}%;top:${80+Math.random()*20}%;animation-duration:${7+Math.random()*8}s;animation-delay:${Math.random()*10}s`;
    c.appendChild(p);
  }
})();

// ENTER key
document.getElementById('action-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendAction()});
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('r-pass2').addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});
document.getElementById('join-code').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase()});

// Auto-login se token salvo
if(token&&username){enterHub()}
</script>
</body>
